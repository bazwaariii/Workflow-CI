name: CI Training Pipeline

on:
  push:
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install MLflow
        run: pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local
          
      - name: Get Latest Run ID
        id: get_run
        run: |
          cd MLProject
          RUN_ID=$(ls mlruns/0 | grep -v meta.yaml | head -n 1)
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          
      - name: Build Docker Image
        run: |
          cd MLProject
          mlflow models build-docker -m mlruns/0/${{ steps.get_run.outputs.run_id }}/artifacts/model -n msml_model:latest
          
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push Docker Image
        run: |
          docker tag msml_model:latest ${{ secrets.DOCKER_USERNAME }}/msml_model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/msml_model:latest
